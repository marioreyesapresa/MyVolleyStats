# Cloud Build — despliegue automático a Cloud Run
# Se activa con un trigger de Cloud Build conectado al repo GitHub (rama main).
#
# Permisos necesarios para la cuenta de servicio de Cloud Build
# (127334410815@cloudbuild.gserviceaccount.com):
#   roles/run.admin, roles/artifactregistry.writer, roles/iam.serviceAccountUser
#
# Correo (recuperación de contraseña): crear UNA VEZ en Secret Manager el secreto
# `voley-email-password` con la contraseña de aplicación de Gmail (16 caracteres).
# No va en el repo ni en --set-env-vars. Ver README sección producción.

steps:
  # 1. Construir imagen Docker
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  # 2. Subir imagen a Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}

  # 3. Desplegar en Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - voley-stats
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --timeout=60
      - --set-env-vars=DJANGO_DEBUG=False,ALLOWED_HOSTS=${_ALLOWED_HOSTS},CSRF_TRUSTED_ORIGINS=${_CSRF_ORIGINS},${_EMAIL_ENV}
      - --set-secrets=SECRET_KEY=voley-secret-key:latest,DATABASE_URL=voley-database-url:latest,EMAIL_HOST_PASSWORD=voley-email-password:latest
      - --quiet

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

substitutions:
  _IMAGE: europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/voley-stats
  _ALLOWED_HOSTS: voley-stats-127334410815.europe-west1.run.app
  _CSRF_ORIGINS: https://voley-stats-127334410815.europe-west1.run.app
  _EMAIL_ENV: EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend,EMAIL_HOST=smtp.gmail.com,EMAIL_PORT=587,EMAIL_HOST_USER=myvolleystats@gmail.com,EMAIL_USE_TLS=True,DEFAULT_FROM_EMAIL=myvolleystats@gmail.com

options:
  logging: CLOUD_LOGGING_ONLY
